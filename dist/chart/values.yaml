## String to partially override chart.fullname template (will maintain the release name)
##
# nameOverride: ""

## String to fully override chart.fullname template
##
# fullnameOverride: ""

## Configure the controller manager deployment
##
manager:
  ## Set to false to skip manager installation
  ##
  enabled: true

  replicas: 1

  image:
    ## Operator image. Also published to Docker Hub as
    ## criu/checkpoint-restore-operator.
    ##
    repository: quay.io/criu/checkpoint-restore-operator
    ## Image tag. Pinned to "latest" because that is the only tag currently
    ## published. Once versioned images are released, set this to "" to track
    ## Chart.appVersion instead.
    ##
    tag: latest
    pullPolicy: IfNotPresent

  ## Arguments
  ##
  args:
    - --leader-elect

  ## Image pull secrets
  ##
  # imagePullSecrets:
  #   - name: myregistrykey

  ## Pod-level security settings
  ##
  podSecurityContext:
    runAsNonRoot: true

  ## Container-level security settings
  ##
  securityContext:
    allowPrivilegeEscalation: true
    capabilities:
      add:
      - DAC_OVERRIDE
      - FOWNER
      drop:
      - ALL
    runAsNonRoot: false
    runAsUser: 0

  ## Resource limits and requests
  ##
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

  ## Manager pod's affinity
  ##
  affinity: {}

  ## Manager pod's node selector
  ##
  nodeSelector: {}

  ## Manager pod's tolerations
  ##
  tolerations: []

  ## Deployment strategy
  ##
  # strategy:
  #   type: RollingUpdate
  #   rollingUpdate:
  #     maxSurge: 25%
  #     maxUnavailable: 25%

  ## Priority class name
  ##
  # priorityClassName: ""

  ## Topology spread constraints
  ##
  # topologySpreadConstraints: []

  ## Termination grace period seconds
  ##
  terminationGracePeriodSeconds: 10

  ## Custom Deployment labels
  ##
  # labels: {}

  ## Custom Deployment annotations
  ##
  # annotations: {}

  ## Custom Pod labels and annotations
  ##
  # pod:
  #   labels: {}
  #   annotations: {}

  ## Extra volumes and volume mounts.
  ##
  ## The default hostPath mount exposes kubelet's checkpoint directory to the
  ## operator so it can prune and manage checkpoint archives. The mountPath
  ## must match the operator's checkpointDirectory setting. Adjust the hostPath
  ## if your kubelet uses a non-default checkpoint location.
  ##
  extraVolumes:
    - hostPath:
        path: /var/lib/kubelet/checkpoints
        type: Directory
      name: kubelet-checkpoints

  extraVolumeMounts:
    - mountPath: /var/lib/kubelet/checkpoints
      name: kubelet-checkpoints

## RBAC configuration
##
rbac:
  ## RBAC resource scope
  ## - false (default): ClusterRole/ClusterRoleBinding (all namespaces)
  ## - true: Role/RoleBinding (release namespace only)
  ##
  namespaced: false

  ## Helper roles for CRD management (admin/editor/viewer)
  ##
  helpers:
    ## Install convenience admin/editor/viewer roles for CRDs
    ##
    enable: false

## ServiceAccount configuration
##
serviceAccount:
  # Install default ServiceAccount provided
  enable: true

  ## Existing ServiceAccount name (only when enable=false)
  ## Note: When enable=true, respects nameOverride/fullnameOverride
  ##
  # name: ""

  ## Custom ServiceAccount annotations
  ##
  # annotations: {}

  ## Custom ServiceAccount labels
  ##
  # labels: {}

## Custom Resource Definitions
##
crd:
  # Install CRDs with the chart. Set to false if you manage CRDs separately
  # (for example, applied from config/crd before installing the chart).
  enable: true
  # Keep CRDs when uninstalling the release. Recommended: deleting the CRDs
  # also deletes every CheckpointRestoreOperator, CheckpointSchedule and
  # ForensicSnapshotChain custom resource in the cluster.
  keep: true

## Controller metrics endpoint.
## Enable to expose /metrics endpoint
##
metrics:
  enable: true
  # Metrics server port
  port: 8443
  # Enable secure metrics: HTTPS with certs/auth (true) or HTTP (false).
  # Note: Metrics authn/authz needs ClusterRole access.
  secure: true

## Cert-manager integration for TLS certificates.
## Required for webhook certificates and metrics endpoint certificates.
##
certManager:
  enable: false

## Prometheus ServiceMonitor for metrics scraping.
## Requires prometheus-operator to be installed in the cluster.
##
prometheus:
  enable: false

