apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.rbac.namespaced }}
kind: RoleBinding
{{- else }}
kind: ClusterRoleBinding
{{- end }}
metadata:
{{- if .Values.rbac.namespaced }}
  namespace: {{ .Release.Namespace }}
{{- end }}
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: checkpoint-restore-operator
    app.kubernetes.io/instance: manager-rolebinding
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: clusterrolebinding
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/part-of: checkpoint-restore-operator
  name: {{ include "checkpoint-restore-operator.resourceName" (dict "suffix" "manager-rolebinding" "context" $) }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  {{- if .Values.rbac.namespaced }}
  kind: Role
  {{- else }}
  kind: ClusterRole
  {{- end }}
  name: {{ include "checkpoint-restore-operator.resourceName" (dict "suffix" "manager-role" "context" $) }}
subjects:
- kind: ServiceAccount
  name: {{ include "checkpoint-restore-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
