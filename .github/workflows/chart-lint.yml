name: helm-chart

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: helm lint
        run: helm lint dist/chart

      - name: Render and validate manifests
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz kubeconform
          helm template checkpoint-restore-operator dist/chart \
            | ./kubeconform -strict -ignore-missing-schemas -summary

  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1

      - name: helm install
        run: |
          helm install checkpoint-restore-operator dist/chart \
            --namespace checkpoint-restore-operator-system --create-namespace \
            --values dist/chart/ci/kind-values.yaml \
            --wait --timeout 5m

      - name: Show installed resources
        if: always()
        run: |
          kubectl get crd | grep criu.org
          kubectl get all -n checkpoint-restore-operator-system

      - name: helm uninstall
        run: helm uninstall checkpoint-restore-operator --namespace checkpoint-restore-operator-system
