apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: protect-restore-annotations
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - pods
  validations:
    - expression: >-
        request.userInfo.username == 'system:serviceaccount:checkpoint-restore-operator-system:checkpoint-restore-operator-controller-manager' ||
        !has(object.metadata.annotations) ||
        object.metadata.annotations.all(k,
          !k.startsWith('restore.criu.org/checkpoint-path.') ||
          (oldObject != null &&
           has(oldObject.metadata.annotations) &&
           k in oldObject.metadata.annotations &&
           object.metadata.annotations[k] == oldObject.metadata.annotations[k]))
      message: restore.criu.org/checkpoint-path.* annotations can only be set or changed by the PodRestore controller
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: protect-restore-annotations
spec:
  policyName: protect-restore-annotations
  validationActions:
    - Deny
